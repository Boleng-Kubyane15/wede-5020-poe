<main>
    <h2>Product & Custom Order Inquiry</h2>
    <p>Please fill in the form below to enquire about our products or request a custom cake.</p>

    <form>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="product">Product / Service:</label><br>
        <input type="text" id="product" name="product"><br><br>

        <label for="volunteer or a sponsor">Volunteer / Sponsor:</label><br>
        <input type="volunteer or a sponsor" id="volunteer or a sponsor"name="volunteer or a sponsor"><br><br>

        <label for="details">Details (e.g., cake design, quantity):</label><br>
        <textarea id="details" name="details" rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Submit Inquiry">
    </form>
